                { t: "MeasureWiz 간편 안내", p: "MeasureWiz", u: "./docs/products/measurewiz/quick-guide.html", k: "measurewiz 간편 quick start 시작 측정" },
                { t: "MeasureWiz 상세 사용설명서", p: "MeasureWiz", u: "./docs/products/measurewiz/manual.html", k: "measurewiz manual 구성품 전극 eeg ecg eog emg 충전 앱 블루투스" },
                { t: "MeasureWiz 스트레스 패러다임", p: "MeasureWiz", u: "./docs/products/measurewiz/stress-guide.html", k: "measurewiz stress 스트레스 패러다임 휴식 차트" },
                { t: "SignalWiz 간편 안내", p: "SignalWiz", u: "./docs/products/signalwiz/quick-guide.html", k: "signalwiz 간편 quick 시작 측정" },
                { t: "SignalWiz 상세 사용설명서", p: "SignalWiz", u: "./docs/products/signalwiz/manual.html", k: "signalwiz manual eeg 임피던스 채널 모니터 녹화 csv" },
                { t: "VetWiz-ECG 간편 안내", p: "VetWiz-ECG", u: "./docs/products/vetwiz-ecg/quick-guide.html", k: "vetwiz ecg 심전도 간편 quick 프로필 측정" },
                { t: "VetWiz-ECG 상세 사용설명서", p: "VetWiz-ECG", u: "./docs/products/vetwiz-ecg/manual.html", k: "vetwiz ecg 심전도 manual 구성품 전극 충전 사양" },
                { t: "VetWiz-ECG 앱 사용법", p: "VetWiz-ECG", u: "./docs/products/vetwiz-ecg/manual.html#app-install", k: "vetwiz ecg 앱 사용법 프로필 측정 보고서 pdf 검색 설정 구독" },
                { t: "VetWiz EEG 간편 안내", p: "VetWiz EEG", u: "./docs/products/vetwiz-eeg/quick-guide.html", k: "vetwiz eeg 뇌파 간편 quick 채널 임피던스 녹화" },
                { t: "VetWiz EEG 상세 사용설명서", p: "VetWiz EEG", u: "./docs/products/vetwiz-eeg/manual.html", k: "vetwiz eeg 뇌파 manual 채널 임피던스 모니터 녹화 리포트" },
                { t: "VetWiz EEG 분석(스펙트럼·Scalp Map)", p: "VetWiz EEG", u: "./docs/products/vetwiz-eeg/manual.html#analysis", k: "vetwiz eeg 분석 파워스펙트럼 scalp map 대역 델타 세타 알파 베타 감마" },
                { t: "개인정보 처리방침 (홈페이지)", p: "법적 고지", u: "./docs/personalpolicy.html", k: "개인정보 처리방침 privacy 회사 홈페이지 쿠키" },

            ];
            var q = document.getElementById("q");
            var res = document.getElementById("results");
            var grid = document.getElementById("grid");
            if (!q) return;
            function esc(s) { return s.replace(/[&<>]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]; }); }
            function render(list) {
                if (!list.length) { res.innerHTML = '<li class="empty">검색 결과가 없습니다.</li>'; return; }
                res.innerHTML = list.map(function (e) {
                    return '<li><a href="' + e.u + '">' + esc(e.t) + '<span class="tag">' + esc(e.p) + '</span></a></li>';
                }).join("");
            }
            q.addEventListener("input", function () {
                var v = q.value.trim().toLowerCase();
                if (!v) { res.hidden = true; res.innerHTML = ""; grid.hidden = false; return; }
                var list = idx.filter(function (e) { return (e.t + " " + e.p + " " + e.k).toLowerCase().indexOf(v) >= 0; });
                grid.hidden = true; res.hidden = false; render(list);
            });
        })();
