<!DOCTYPE html>
<html lang="ko">
<head>

    <title>뉴로위즈텍 제품 소개</title>
    <style>
        body { font-family: Arial, "Malgun Gothic", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f4f4f9; padding: 24px; box-sizing: border-box; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 880px; width: 100%; box-sizing: border-box; }
        h1 { color: #333; }
        .app-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 28px; margin-top: 28px; }
        .app-card { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 170px; }
        .app-card img { width: 96px; height: 96px; object-fit: cover; border-radius: 22px; background: #fff; border: 1px solid #e3e6ee; box-shadow: 0 8px 18px rgba(0,0,0,0.15); }
        .app-name { font-weight: 700; color: #333; font-size: 1rem; }
        .app-links { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .app-links a { display: block; text-decoration: none; font-size: 0.9rem; font-weight: 600; padding: 9px 10px; border-radius: 8px; transition: background 0.15s; }
        .app-links .primary { background: #0b6cf0; color: #fff; }
        .app-links .primary:hover { background: #084ba8; }
        .app-links .secondary { background: #eef2fb; color: #24324a; }
        .app-links .secondary:hover { background: #dfe7f7; }
    </style>
</head>

            </div>
